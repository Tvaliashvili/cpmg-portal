// ─── ICON ─────────────────────────────────────────────────────────────────────
// Uses lucide's own HTML API: render a placeholder <i data-lucide="name">,
// then call lucide.createIcons() to replace it with the real SVG.
function Icon({name, size=16, className="", color="currentColor"}){
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current;
    if(!el || !window.lucide) return;
    // place the lucide i-tag inside our span, then hydrate it
    el.innerHTML = `<i data-lucide="${name}" style="width:${size}px;height:${size}px;color:${color}"></i>`;
    window.lucide.createIcons({nodes:[el]});
    // after createIcons the <i> is replaced with <svg>; apply className to svg
    const svg = el.querySelector('svg');
    if(svg && className){
      svg.setAttribute('class', className);
      svg.style.width  = size+'px';
      svg.style.height = size+'px';
      svg.style.color  = color;
    }
  },[name,size,className,color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0,width:size,height:size}}/>;
}

// ─── HELPER: compute completion % from milestones ────────────────────────────
function calcCompletion(timeline){
  const ms=timeline.filter(e=>e.type==="milestone"&&!e.isSystem);
  if(!ms.length) return 0;
  const done=ms.filter(e=>e.status==="complete").length;
  return Math.round((done/ms.length)*100);
}

// ─── SHARED UI ────────────────────────────────────────────────────────────────
function Av({initials,size="md"}){
  const s=size==="sm"?"w-7 h-7 text-xs":size==="lg"?"w-11 h-11 text-sm":"w-9 h-9 text-xs";
  return <div className={`${s} rounded-full flex items-center justify-center font-bold text-white shrink-0`} style={{background:"linear-gradient(135deg,#2563eb,#1e3a8a)"}}>{initials}</div>;
}
function ProgressBar({value,color="bg-emerald-500"}){
  return <div className="w-full h-1.5 bg-slate-700 rounded-full overflow-hidden"><div className={`h-full ${color} rounded-full`} style={{width:`${value}%`,transition:"width .3s"}}/></div>;
}
function Tag({children,variant="default"}){
  const v={default:"bg-slate-700 text-slate-300",success:"bg-emerald-500/20 text-emerald-400",warning:"bg-amber-500/20 text-amber-400",danger:"bg-red-500/20 text-red-400",info:"bg-sky-500/20 text-sky-400"}[variant]||"bg-slate-700 text-slate-300";
  return <span className={`text-xs px-2 py-0.5 rounded font-medium ${v}`}>{children}</span>;
}
function RoleBadge({role}){
  const c={boss:{label:"The Boss",cls:"bg-amber-500/20 text-amber-300 border-amber-500/40",icon:"shield"},pm:{label:"Project Manager",cls:"bg-sky-500/20 text-sky-300 border-sky-500/40",icon:"hard-hat"},client:{label:"Client",cls:"bg-emerald-500/20 text-emerald-300 border-emerald-500/40",icon:"eye"}}[role]||{label:role,cls:"bg-slate-700 text-slate-300 border-slate-600",icon:"user"};
  return <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold border ${c.cls}`}><Icon name={c.icon} size={11}/>{c.label}</span>;
}
const inputCls="w-full bg-slate-700/60 border border-slate-600 rounded-lg px-3 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:bg-slate-700 transition-colors";
const selectCls=inputCls+" cursor-pointer";
function Field({label,required,error,children}){
  return <div><label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">{label}{required&&<span className="text-red-400 ml-0.5">*</span>}</label>{children}{error&&<p className="text-xs text-red-400 mt-1">{error}</p>}</div>;
}
function Toggle({value,onChange,label}){
  return <label className="flex items-center gap-2.5 cursor-pointer select-none" onClick={()=>onChange(!value)}><div className={`w-10 h-5 rounded-full relative transition-colors ${value?"bg-red-500":"bg-slate-600"}`}><div className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-all ${value?"left-5":"left-0.5"}`}/></div><span className="text-xs text-slate-400 font-medium">{label}</span></label>;
}

// ─── MODAL SHELL ──────────────────────────────────────────────────────────────
function Modal({title,subtitle,onClose,wide,children}){
  useEffect(()=>{
    const fn=e=>{if(e.key==="Escape")onClose();};
    document.addEventListener("keydown",fn);
    return()=>document.removeEventListener("keydown",fn);
  },[onClose]);
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(2,6,23,.87)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className={`modal-in bg-slate-900 border border-slate-700/80 rounded-2xl shadow-2xl flex flex-col w-full ${wide?"max-w-2xl":"max-w-lg"}`} style={{maxHeight:"92vh"}}>
        <div className="flex items-start justify-between px-6 py-5 border-b border-slate-800 shrink-0">
          <div><h2 className="text-base font-bold text-slate-100">{title}</h2>{subtitle&&<p className="text-xs text-slate-500 mt-0.5">{subtitle}</p>}</div>
          <button onClick={onClose} className="w-8 h-8 rounded-lg bg-slate-800 hover:bg-slate-700 flex items-center justify-center text-slate-400 hover:text-white shrink-0 ml-3"><Icon name="x" size={15}/></button>
        </div>
        <div className="overflow-y-auto flex-1 px-6 py-5">{children}</div>
      </div>
    </div>
  );
}

// ─── NEW PROJECT MODAL ────────────────────────────────────────────────────────
function NewProjectModal({onClose,onCreate,activePMs,activeClients}){
  const [f,setF]=useState({name:"",clientId:"",budget:"",status:"starting",assignedPM:"",location:"",startDate:todayISO(),endDate:""});
  const [err,setErr]=useState({});
  const set=(k,v)=>{setF(p=>({...p,[k]:v}));setErr(p=>({...p,[k]:""}));};
  const validate=()=>{
    const e={};
    if(!f.name.trim())e.name="Required";
    if(!f.clientId)e.client="Please select a registered client";
    if(!f.budget.trim())e.budget="Required";
    if(!f.assignedPM)e.assignedPM="Please assign a PM";
    return e;
  };
  const submit=()=>{
    const e=validate();if(Object.keys(e).length){setErr(e);return;}
    const clientObj=activeClients.find(c=>c.id===f.clientId);
    const clientName=clientObj?.company||clientObj?.name||"Unknown Client";
    const pmName=activePMs.find(p=>p.id===f.assignedPM)?.name||"Team";
    const budget=f.budget.trim().startsWith("$")?f.budget.trim():`$${f.budget.trim()}`;
    const now=todayISO();
    const proj={id:genId(),name:f.name.trim(),client:clientName,status:f.status,assignedPM:f.assignedPM,location:f.location.trim()||"TBD",budget,completion:f.status==="finished"?100:f.status==="active"?5:0,startDate:f.startDate||now,endDate:f.endDate||"",
      timeline:[{id:genId(),type:"message",date:now,author:"Alexander Reid",msgRole:"Administrator",content:`Project "${f.name.trim()}" created by Alexander Reid (Boss). Assigned PM: ${pmName}. Client: ${clientName}. Budget: ${budget}. Status: ${f.status}.`,urgent:false,isSystem:true}]};
    onCreate(proj);onClose();
  };
  return(
    <Modal title="Create New Project" subtitle="Boss-only · Appears on dashboard immediately" onClose={onClose} wide>
      <div className="space-y-4">
        <Field label="Project Name" required error={err.name}><input className={inputCls} placeholder="e.g. Riverside Mixed-Use Development" value={f.name} onChange={e=>set("name",e.target.value)}/></Field>

        {/* Client — expandable dropdown */}
        <Field label="Client" required error={err.client}>
          {activeClients.length===0 ? (
            <div className="rounded-xl border border-amber-500/20 bg-amber-500/5 p-3 flex items-center gap-2">
              <Icon name="alert-circle" size={14} className="text-amber-400 shrink-0"/>
              <p className="text-xs text-amber-300">No registered clients yet. Go to <strong>Invite Manager</strong> to generate a client invite code first.</p>
            </div>
          ) : (()=>{
            const selClient = activeClients.find(c=>c.id===f.clientId);
            const [clientOpen, setClientOpen] = useState(false);
            return(
              <div>
                {/* Trigger button — shows selected or placeholder */}
                <button type="button" onClick={()=>setClientOpen(p=>!p)}
                  className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl border text-left transition-all ${clientOpen?"border-blue-500/50 bg-slate-800":"border-slate-600 bg-slate-800/50 hover:border-slate-500"}`}>
                  {selClient ? (
                    <>
                      <Av initials={selClient.avatar} size="sm"/>

                        <div className="text-xs font-semibold text-slate-200 truncate">{selClient.name}</div>
                        <div className="text-slate-500 truncate" style={{fontSize:10}}>{selClient.company} · {selClient.email}</div>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center shrink-0">
                        <Icon name="user" size={13} className="text-slate-500"/>
                      </div>
                      <span className="text-sm text-slate-500 flex-1">Select a registered client…</span>
                    </>
                  )}
                  <Icon name={clientOpen?"chevron-up":"chevron-down"} size={14} className="text-slate-500 shrink-0"/>
                </button>

                {/* Expandable list */}
                {clientOpen&&(
                  <div className="mt-1.5 rounded-xl border border-slate-700 bg-slate-800/80 overflow-hidden">
                    {activeClients.map((cl,i)=>(
                      <button key={cl.id} type="button"
                        onClick={()=>{ set("clientId",cl.id); setClientOpen(false); }}
                        className={`w-full flex items-center gap-3 px-3 py-2.5 text-left transition-colors ${i>0?"border-t border-slate-700/60":""} ${f.clientId===cl.id?"bg-blue-500/10":"hover:bg-slate-700/60"}`}>
                        <Av initials={cl.avatar} size="sm"/>
                        <div className="flex-1 min-w-0">
                          <div className={`text-xs font-semibold truncate ${f.clientId===cl.id?"text-blue-300":"text-slate-300"}`}>{cl.name}</div>
                          <div className="text-slate-500 truncate" style={{fontSize:10}}>{cl.company} · {cl.email}</div>
                        </div>
                        {f.clientId===cl.id&&<Icon name="check" size={13} className="text-blue-400 shrink-0"/>}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            );
          })()}
        </Field>

        <div className="grid grid-cols-2 gap-3">
          <Field label="Budget" required error={err.budget}><input className={inputCls} placeholder="e.g. $12.5M" value={f.budget} onChange={e=>set("budget",e.target.value)}/></Field>
          <Field label="Status"><select className={selectCls} value={f.status} onChange={e=>set("status",e.target.value)}><option value="starting">Starting</option><option value="active">Active</option><option value="finished">Finished</option></select></Field>

// ─── PROJECT DETAIL ───────────────────────────────────────────────────────────
function ProjectDetail({project,role,teamPMs,onBack,onUpdateTimeline}){
  const [timeline,setTimeline]=useState(project.timeline);
  const [showMsg,setShowMsg]=useState(false);
  const [showMilestone,setShowMilestone]=useState(false);
  const [showDocument,setShowDocument]=useState(false);
  const [msgText,setMsgText]=useState("");
  const [justCompleted,setJustCompleted]=useState(null); // id of last milestone marked complete
  const assignedPM=teamPMs.find(p=>p.id===project.assignedPM);
  const st=STATUS_CFG[project.status]||STATUS_CFG.active;
  const uploaderName=role===ROLES.BOSS?"Alexander Reid":role===ROLES.PM?(assignedPM?.name||"PM"):"Client";
  const isFinished=project.status==="finished";
  const isLocked=isFinished&&role!==ROLES.BOSS;

  // Sorted milestones for tracker strip
  const milestones=timeline.filter(e=>e.type==="milestone"&&!e.isSystem).sort((a,b)=>(a.order||99)-(b.order||99));
  const completion=isFinished?100:calcCompletion(timeline);
  const completedCount=milestones.filter(m=>m.status==="complete").length;

  // ── Toggle milestone complete/upcoming ──────────────────────────────────
  const handleToggleMilestone=(id)=>{
    setTimeline(prev=>{
      const updated=prev.map(e=>{
        if(e.id!==id) return e;
        const newStatus=e.status==="complete"?"upcoming":"complete";
        return {...e, status:newStatus};
      });
      // Check if all milestones are now complete → auto-finish project
      const allMs=updated.filter(e=>e.type==="milestone"&&!e.isSystem);
      const allDone=allMs.length>0&&allMs.every(e=>e.status==="complete");
      const newCompletion=isFinished?100:calcCompletion(updated);
      // Bubble up to App state
      if(onUpdateTimeline) onUpdateTimeline(project.id, updated, newCompletion, allDone?"finished":project.status);
      if(allDone&&project.status!=="finished"){
        setJustCompleted(id);
        setTimeout(()=>setJustCompleted(null),3000);
      }
      return updated;
    });
  };

  const del=id=>{
    setTimeline(prev=>{
      const updated=prev.filter(e=>e.id!==id);
      const newCompletion=isFinished?100:calcCompletion(updated);
      if(onUpdateTimeline) onUpdateTimeline(project.id,updated,newCompletion,project.status);
      return updated;
    });
  };
  const add=e=>{
    setTimeline(prev=>{
      const updated=[...prev,{...e,order:e.type==="milestone"?milestones.length+1:undefined}];
      const newCompletion=isFinished?100:calcCompletion(updated);
      if(onUpdateTimeline) onUpdateTimeline(project.id,updated,newCompletion,project.status);
      return updated;
    });
  };
  const postMsg=()=>{if(!msgText.trim())return;const rMap={boss:"Administrator",pm:"Project Manager",client:"Client"};add({id:genId(),type:"message",date:todayISO(),author:uploaderName,msgRole:rMap[role],content:msgText.trim(),urgent:false});setMsgText("");setShowMsg(false);};
  useEffect(()=>{ if(isLocked){ setShowMsg(false); setShowMilestone(false); setShowDocument(false); } },[isLocked]);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {showMilestone&&<AddMilestoneModal onClose={()=>setShowMilestone(false)} onAdd={add}/>}
      {showDocument &&<AddDocumentModal  onClose={()=>setShowDocument(false)}  onAdd={add} uploaderName={uploaderName}/>}

      {/* Auto-complete toast */}
      {justCompleted&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:500}} className="modal-in flex items-center gap-3 px-5 py-3 rounded-2xl bg-emerald-600 text-white text-sm font-bold shadow-2xl">
          <Icon name="check-circle-2" size={18} className="text-white"/>All milestones complete — project marked Finished!
        </div>
      )}

      {/* ── Compact Header ── */}
      <div className="bg-slate-800/50 border-b border-slate-700/60 px-4 sm:px-6 py-3 shrink-0">
        <button onClick={onBack} className="flex items-center gap-1.5 text-xs text-slate-400 hover:text-slate-200 mb-2.5 font-medium"><Icon name="arrow-left" size={13}/>All Projects</button>

        <div className="flex items-center justify-between gap-3 flex-wrap">
          {/* Left: title + meta inline */}
          <div className="flex items-center gap-3 flex-wrap min-w-0">
            <div className="min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                <h2 className="text-base sm:text-lg font-bold text-slate-100 truncate">{project.name}</h2>
                <span className={`flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold border ${st.bg} ${st.color} ${st.border}`}><span className={`w-1.5 h-1.5 rounded-full ${st.dot}`}/>{st.label}</span>
                {isFinished&&<span className="flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold border bg-slate-500/10 text-slate-400 border-slate-500/30"><Icon name="lock" size={9}/>Read Only</span>}
              </div>
              <div className="flex items-center gap-3 mt-1 flex-wrap">
                <span className="text-xs text-slate-500">{project.client} · {project.location}</span>
                {/* PM inline */}
                {assignedPM&&(
                  <div className="flex items-center gap-1.5">
                    <Av initials={assignedPM.avatar} size="sm"/>
                    <span className="text-xs text-slate-400 font-medium">{assignedPM.name}</span>
                    <span className="text-xs text-slate-600">· PM</span>
                  </div>
                )}
                {project.startDate&&<span className="text-xs text-slate-600">{fmtDate(project.startDate)} → {project.endDate?fmtDate(project.endDate):"TBD"}</span>}
              </div>
            </div>
          </div>

          {/* Right: budget + progress */}
          <div className="flex items-center gap-4 shrink-0">
            <div className="text-right">
              <div className="text-base font-bold text-slate-100">{project.budget}</div>
              <div className="text-xs text-slate-500">Budget</div>
            </div>
            <div style={{width:120}}>
              <div className="flex justify-between text-xs mb-1">
                <span className="text-slate-500">{completedCount}/{milestones.length} phases</span>
                <span className="font-bold text-slate-200">{completion}%</span>
              </div>
              <ProgressBar value={completion} color={isFinished?"bg-slate-500":"bg-emerald-500"}/>
            </div>
          </div>
        </div>
      </div>

      {/* Locked banner */}
      {isLocked&&(
        <div className="mx-4 sm:mx-6 mt-3 rounded-xl border border-slate-600/50 bg-slate-800/60 px-4 py-2.5 flex items-center gap-3 shrink-0">
          <div className="w-7 h-7 rounded-lg bg-slate-700 flex items-center justify-center shrink-0"><Icon name="lock" size={13} className="text-slate-400"/></div>
          <p className="text-xs text-slate-400"><strong className="text-slate-300">Project Closed</strong> — marked Finished by the project management company. Timeline is read-only.</p>
        </div>
      )}

      {/* ── Two-column body: vertical phase tracker LEFT + timeline RIGHT ── */}
      <div style={{flex:1,overflow:"hidden",display:"flex"}}>

        {/* Left: Vertical Phase Tracker */}
        <div style={{width:200,flexShrink:0,borderRight:"1px solid #1e293b",overflowY:"auto"}} className="px-3 py-4 hidden sm:block">
          <div className="flex items-center gap-1.5 mb-3">
            <Icon name="list-checks" size={12} className="text-slate-500"/>
            <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Phases</span>
          </div>
          <div className="space-y-0">
            {milestones.map((m,i)=>{
              const isDone=m.status==="complete";
              const isNext=!isDone&&milestones.slice(0,i).every(x=>x.status==="complete");
              const isLast=i===milestones.length-1;
              return(
                <div key={m.id}>
                  <div className={`flex items-start gap-2.5 rounded-lg px-2 py-2 ${isNext?"bg-blue-500/5":""}`}>
                    {/* Circle */}
                    <div className={`w-6 h-6 rounded-full flex items-center justify-center shrink-0 mt-0.5 text-xs font-bold border-2 ${
                      isDone?"bg-emerald-500 border-emerald-500 text-white":
                      isNext?"bg-transparent border-blue-500 text-blue-400":
                      "bg-transparent border-slate-700 text-slate-600"}`}>
                      {isDone?<Icon name="check" size={10} className="text-white"/>:<span style={{fontSize:10}}>{i+1}</span>}
                    </div>
                    {/* Label */}
                    <div className="flex-1 min-w-0">
                      <div className={`text-xs font-semibold leading-tight ${isDone?"text-emerald-400":isNext?"text-blue-300":"text-slate-600"}`}>
                        {m.title}
                      </div>
                      <div className="text-slate-700 mt-0.5" style={{fontSize:9}}>{fmtDate(m.date)}</div>
                    </div>
                  </div>
                  {/* Connector line */}
                  {!isLast&&(
                    <div className={`ml-4 w-0.5 h-3 ${isDone?"bg-emerald-500/40":"bg-slate-700"}`}/>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Right: Timeline feed */}
        <div style={{flex:1,overflowY:"auto"}} className="px-4 sm:px-6 py-5">
          <div className="flex items-center justify-between mb-5 flex-wrap gap-2">
            <div>
              <h3 className="font-bold text-slate-100 text-sm">Project Timeline</h3>
              <p className="text-xs text-slate-500 mt-0.5">{timeline.length} entries{isFinished?" · Read-only":""}</p>
            </div>
            {!isLocked&&(
              <div className="flex items-center gap-2 flex-wrap">
                {(role===ROLES.BOSS||role===ROLES.PM)&&<>
                  <button onClick={()=>setShowMilestone(true)} className="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-blue-600/20 hover:bg-blue-600/30 border border-blue-500/20 text-blue-300 text-xs font-semibold"><Icon name="hammer" size={13}/>Milestone</button>
                  <button onClick={()=>setShowDocument(true)}  className="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-violet-600/20 hover:bg-violet-600/30 border border-violet-500/20 text-violet-300 text-xs font-semibold"><Icon name="file-plus" size={13}/>Document</button>
                </>}
                <button onClick={()=>setShowMsg(true)} className="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs font-semibold"><Icon name="message-circle" size={13}/>Message</button>
              </div>
            )}
          </div>

          {showMsg&&!isLocked&&(
            <div className="mb-5 rounded-xl border border-blue-500/30 bg-slate-800 p-4">
              <p className="text-xs font-semibold text-slate-300 mb-2">New Message</p>
              <textarea value={msgText} onChange={e=>setMsgText(e.target.value)} rows={3} placeholder="Type your message…" style={{resize:"none"}} className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500"/>
              <div className="flex gap-2 mt-2 justify-end"><button onClick={()=>{setShowMsg(false);setMsgText("");}} className="px-3 py-1.5 rounded-lg bg-slate-700 text-slate-300 text-xs font-medium hover:bg-slate-600">Cancel</button><button onClick={postMsg} className="px-3 py-1.5 rounded-lg bg-blue-600 text-white text-xs font-semibold hover:bg-blue-500">Post</button></div>
            </div>
          )}

          {timeline.length===0&&(<div className="flex flex-col items-center justify-center py-16 text-center"><div className="w-14 h-14 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center mb-4"><Icon name="inbox" size={24} className="text-slate-600"/></div><p className="text-slate-400 font-semibold text-sm">No timeline entries yet</p>{!isLocked&&<p className="text-slate-600 text-xs mt-1">Use the buttons above to get started.</p>}</div>)}

          {[...timeline].sort((a,b)=>{
            if(a.type==="milestone"&&b.type==="milestone") return (a.order||99)-(b.order||99);
            return new Date(a.date)-new Date(b.date);
          }).map(entry=><TimelineEntry key={entry.id} entry={entry} role={role} onDelete={del} onToggleMilestone={handleToggleMilestone} isLocked={isLocked}/>)}
        </div>
      </div>
    </div>
  );
}

  return(
    <div className="relative rounded-xl border border-slate-700/60 bg-slate-800/60 hover:border-slate-600 overflow-visible" style={{transition:"border-color .15s"}}>

          <div className="flex-1 min-w-0 pr-2">
            <div className="mb-1.5" style={{position:"relative",display:"inline-block"}}>
              {role===ROLES.BOSS?(
                <>
                  <button onClick={()=>setStDrop(p=>!p)} className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold border cursor-pointer hover:opacity-80 ${st.bg} ${st.color} ${st.border}`}>

                  </button>

                    <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,width:150,zIndex:50,background:"#1e293b",border:"1px solid #334155",borderRadius:10,boxShadow:"0 10px 40px rgba(0,0,0,.5)"}}>
                      {["starting","active","finished"].map(s=>{const c=STATUS_CFG[s];return(
                        <button key={s} onClick={()=>{onChangeStatus(project.id,s);setStDrop(false);}} className={`w-full flex items-center gap-2 px-3 py-2 text-xs hover:bg-slate-700 transition-colors ${project.status===s?"bg-slate-700/60":""}`}>

              )}
            </div>
            <h3 className="font-bold text-slate-100 text-sm leading-tight">{project.name}</h3>
            <p className="text-xs text-slate-500 mt-0.5 truncate">{project.client}</p>

          <div className="text-right shrink-0"><div className="font-bold text-slate-200 text-sm">{project.budget}</div><div className="text-xs text-slate-500">Budget</div></div>
        </div>
        <div className="flex items-center gap-1.5 text-xs text-slate-500 mb-3"><Icon name="building-2" size={11}/><span className="truncate">{project.location}</span></div>
        <div className="mb-4">
          <div className="flex justify-between text-xs mb-1"><span className="text-slate-500">Completion</span><span className="font-semibold text-slate-300">{project.completion}%</span></div>
          <ProgressBar value={project.completion} color={project.status==="finished"?"bg-slate-500":"bg-emerald-500"}/>
          {project.timeline&&(()=>{const ms=project.timeline.filter(e=>e.type==="milestone"&&!e.isSystem);const done=ms.filter(e=>e.status==="complete").length;return ms.length>0&&<div className="text-xs text-slate-600 mt-1">{done}/{ms.length} phases complete</div>})()}
        </div>
        {role===ROLES.BOSS?(
          <div className="relative mb-3">
            <button onClick={()=>setPmDrop(!pmDrop)} className="w-full flex items-center justify-between px-3 py-2 rounded-lg bg-slate-700/60 border border-slate-600 hover:border-slate-500 text-xs transition-colors">
              <div className="flex items-center gap-2">{pm?<Av initials={pm.avatar} size="sm"/>:<div className="w-6 h-6 rounded-full bg-slate-600 flex items-center justify-center"><Icon name="user-plus" size={10} className="text-slate-400"/></div>}<span className={pm?"text-slate-200 font-medium":"text-slate-500"}>{pm?.name||"Assign PM"}</span></div>
              <Icon name="chevron-down" size={12} className="text-slate-400"/>
            </button>
            {pmDrop&&(
              <div className="absolute bottom-full left-0 right-0 mb-1 bg-slate-800 border border-slate-600 rounded-xl overflow-hidden shadow-2xl" style={{zIndex:40}}>
                {teamPMs.map(p=>(
                  <button key={p.id} onClick={()=>{onAssignPM(project.id,p.id);setPmDrop(false);}} className={`w-full flex items-center gap-2 px-3 py-2.5 hover:bg-slate-700 text-xs transition-colors ${project.assignedPM===p.id?"bg-slate-700/60":""}`}>
                    <Av initials={p.avatar} size="sm"/><div className="flex-1 text-left"><div className="font-medium text-slate-200">{p.name}</div><div className="text-slate-500">{p.email}</div></div>
                    {project.assignedPM===p.id&&<Icon name="check" size={12} className="text-emerald-400"/>}
                  </button>
                ))}
              </div>
            )}
          </div>
        ):pm?(
          <div className="flex items-center gap-2 mb-3 px-3 py-2 rounded-lg bg-slate-700/40"><Av initials={pm.avatar} size="sm"/><div><div className="text-xs text-slate-500">Assigned PM</div><div className="text-xs font-semibold text-slate-200">{pm.name}</div></div></div>
        ):null}
        <button onClick={()=>onSelect(project)} className="w-full py-2 rounded-lg bg-blue-600/20 hover:bg-blue-600/30 border border-blue-500/20 text-blue-300 text-xs font-semibold flex items-center justify-center gap-1.5 transition-colors">View Timeline<Icon name="chevron-right" size={12}/></button>
      </div>
    </div>
  );
}

function Dashboard({projects,role,teamPMs,onSelect,onAssignPM,onNew,onChangeStatus}){
  const visible=role===ROLES.PM?projects.filter(p=>p.assignedPM==="pm1"):projects;

  const stats=[{label:"Total",value:visible.length,icon:"building-2",color:"text-blue-400",bg:"bg-blue-500/10"},{label:"Active",value:grouped.active.length,icon:"zap",color:"text-emerald-400",bg:"bg-emerald-500/10"},{label:"Starting",value:grouped.starting.length,icon:"trending-up",color:"text-amber-400",bg:"bg-amber-500/10"},{label:"Finished",value:grouped.finished.length,icon:"check-circle-2",color:"text-slate-400",bg:"bg-slate-500/10"}];
  return(
    <div style={{height:"100%",overflowY:"auto"}} className="p-4 sm:p-6">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">

        {role===ROLES.BOSS&&<button onClick={onNew} className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-white font-bold text-sm" style={{background:"linear-gradient(135deg,#2563eb,#1d4ed8)",boxShadow:"0 4px 20px rgba(37,99,235,.35)"}}><Icon name="plus" size={15} className="text-white"/>New Project</button>}
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
        {stats.map(s=>(
          <div key={s.label} className="rounded-xl border border-slate-700/60 bg-slate-800/50 p-4 flex items-center gap-3">
            <div className={`w-10 h-10 rounded-xl ${s.bg} flex items-center justify-center shrink-0`}><Icon name={s.icon} size={18} className={s.color}/></div>
            <div><div className="text-2xl font-bold text-slate-100">{s.value}</div><div className="text-xs text-slate-500">{s.label}</div></div>

        grouped[key].length>0&&(
          <div key={key} className="mb-8">
            <div className="flex items-center gap-2 mb-4"><span className={`w-2 h-2 rounded-full ${STATUS_CFG[key].dot}`}/><h3 className="font-bold text-slate-200 text-sm uppercase tracking-wider">{label}</h3><span className="text-xs text-slate-600 bg-slate-800 border border-slate-700 rounded-full px-2 py-0.5">{grouped[key].length}</span></div>
            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">

      {visible.length===0&&(<div className="flex flex-col items-center justify-center py-24 text-center"><div className="w-16 h-16 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center mb-4"><Icon name="folder-open" size={28} className="text-slate-600"/></div><p className="text-slate-400 font-semibold">No projects yet</p>{role===ROLES.BOSS&&<p className="text-slate-600 text-xs mt-1">Click New Project to get started.</p>}</div>)}
    </div>
  );
}

// ─── INVITE MANAGER ───────────────────────────────────────────────────────────
function InviteManager(){
  const [type,setType]=useState("pm");const [codes,setCodes]=useState([]);const [copied,setCopied]=useState(null);
  const gen=()=>{const code=Math.floor(100000+Math.random()*900000).toString();setCodes(p=>[{id:Date.now(),type,code,at:new Date().toLocaleString()},...p]);};
  const copy=(code,id)=>{navigator.clipboard.writeText(`https://buildco.portal.com/register?code=${code}&type=${type}`).catch(()=>{});setCopied(id);setTimeout(()=>setCopied(null),2000);};
  return(
    <div style={{height:"100%",overflowY:"auto"}} className="p-4 sm:p-6">
      <div className="max-w-2xl mx-auto">
        <div className="mb-6"><h2 className="text-lg font-bold text-slate-100">Invite Manager</h2><p className="text-sm text-slate-400 mt-0.5">Generate registration codes for PMs and Clients.</p></div>
        <div className="rounded-xl border border-slate-700/60 bg-slate-800/60 p-5 sm:p-6 mb-6">
          <h3 className="text-sm font-bold text-slate-200 mb-4 flex items-center gap-2"><Icon name="key" size={14} className="text-amber-400"/>Generate Invite Code</h3>
          <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Invite Type</label>
          <div className="grid grid-cols-2 gap-2 mb-4">
            {[{v:"pm",label:"Project Manager",icon:"hard-hat",desc:"Full project access"},{v:"client",label:"Client",icon:"eye",desc:"View-only + file upload"}].map(o=>(
              <button key={o.v} onClick={()=>setType(o.v)} className={`flex items-start gap-3 p-3 rounded-xl border text-left ${type===o.v?"border-blue-500/50 bg-blue-500/10":"border-slate-700 bg-slate-800/40 hover:border-slate-600"}`}>
                <Icon name={o.icon} size={16} className={type===o.v?"text-blue-400":"text-slate-500"}/><div><div className={`text-xs font-semibold ${type===o.v?"text-blue-300":"text-slate-300"}`}>{o.label}</div><div className="text-xs text-slate-500">{o.desc}</div></div>
                {type===o.v&&<Icon name="check" size={12} className="text-blue-400 ml-auto mt-0.5 shrink-0"/>}
              </button>
            ))}
          </div>
          <button onClick={gen} className="w-full py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm flex items-center justify-center gap-2"><Icon name="zap" size={14}/>Generate Code</button>
        </div>
        {codes.length>0&&(
          <div className="rounded-xl border border-slate-700/60 bg-slate-800/60 overflow-hidden">
            <div className="px-4 py-3 border-b border-slate-700/60"><span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Generated Codes</span></div>
            {codes.map(c=>(
              <div key={c.id} className="px-4 py-3 flex items-center justify-between gap-3 border-b border-slate-700/30 flex-wrap">
                <div className="flex items-center gap-3"><div className="font-mono text-lg font-bold text-slate-100 tracking-widest">{c.code}</div><div><Tag variant={c.type==="pm"?"info":"success"}>{c.type==="pm"?"Project Manager":"Client"}</Tag><div className="text-xs text-slate-500 mt-0.5">{c.at}</div></div></div>
                <button onClick={()=>copy(c.code,c.id)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold border ${copied===c.id?"bg-emerald-500/20 text-emerald-400 border-emerald-500/30":"bg-slate-700 text-slate-300 hover:bg-slate-600 border-slate-600"}`}><Icon name={copied===c.id?"check":"copy"} size={11}/>{copied===c.id?"Copied!":"Copy Link"}</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function TeamView({activePMs,setActivePMs,activeClients,setActiveClients,projects}){
  const [removed,setRemoved]=useState([]);

  const handleRemove=()=>{
    const {id,type}=confirmRemove;
    if(type==="pm"){
      const pm=activePMs.find(p=>p.id===id);
      setActivePMs(p=>p.filter(x=>x.id!==id));
      setRemoved(r=>[{...pm,type:"pm",removedAt:new Date().toLocaleTimeString()},...r]);
    } else {
      const cl=activeClients.find(c=>c.id===id);
      setActiveClients(c=>c.filter(x=>x.id!==id));
      setRemoved(r=>[{...cl,type:"client",removedAt:new Date().toLocaleTimeString()},...r]);
    }
    setConfirmRemove(null);
  };

    <div style={{height:"100%",overflowY:"auto"}} className="p-4 sm:p-6">

        <RemoveConfirmModal
          name={confirmRemove.name}
          role={confirmRemove.type}
          onConfirm={handleRemove}
          onClose={()=>setConfirmRemove(null)}

            <h2 className="text-base font-bold text-slate-100 flex items-center gap-2"><Icon name="hard-hat" size={16} className="text-sky-400"/>Project Managers</h2>

          </div>
        </div>
        {activePMs.length===0 ? (
          <div className="rounded-xl border border-slate-700/60 bg-slate-800/40 p-8 text-center">
            <Icon name="users" size={28} className="text-slate-700 mx-auto mb-2"/>
            <p className="text-slate-500 text-sm">No project managers. Issue an invite code to add one.</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {activePMs.map(pm=>{
              const assigned=projects.filter(p=>p.assignedPM===pm.id);
              return(
                <div key={pm.id} className="rounded-xl border border-slate-700/60 bg-slate-800/60 p-5">
                  <div className="flex items-start gap-3 mb-4">
                    <Av initials={pm.avatar} size="lg"/>
                    <div className="flex-1 min-w-0">
                      <div className="font-bold text-slate-100 truncate">{pm.name}</div>
                      <div className="text-xs text-slate-500 truncate">{pm.email}</div>
                      <div className="mt-1.5"><RoleBadge role="pm"/></div>
                    </div>
                  </div>
                  <div className="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-2">Assigned Projects ({assigned.length})</div>
                  {assigned.length===0
                    ? <div className="text-xs text-slate-600 italic mb-4">No projects assigned</div>
                    : <div className="space-y-1.5 mb-4">{assigned.map(p=><div key={p.id} className="flex items-center gap-2 text-xs"><span className={`w-1.5 h-1.5 rounded-full ${STATUS_CFG[p.status]?.dot||"bg-slate-500"}`}/><span className="text-slate-300 truncate">{p.name}</span></div>)}</div>
                  }
                  <button
                    onClick={()=>setConfirmRemove({id:pm.id, name:pm.name, type:"pm"})}
                    className="w-full flex items-center justify-center gap-1.5 py-2 rounded-lg bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 text-xs font-semibold transition-colors">
                    <Icon name="user-x" size={12}/>Remove Account
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Clients */}
      <div className="mb-8">
        <div className="flex items-center justify-between mb-4">
          <div>
            <h2 className="text-base font-bold text-slate-100 flex items-center gap-2"><Icon name="eye" size={16} className="text-emerald-400"/>Client Accounts</h2>
            <p className="text-xs text-slate-500 mt-0.5">{activeClients.length} active account{activeClients.length!==1?"s":""}</p>
          </div>
        </div>
        {activeClients.length===0 ? (
          <div className="rounded-xl border border-slate-700/60 bg-slate-800/40 p-8 text-center">
            <Icon name="users" size={28} className="text-slate-700 mx-auto mb-2"/>
            <p className="text-slate-500 text-sm">No client accounts. Issue a client invite code to add one.</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {activeClients.map(cl=>(
              <div key={cl.id} className="rounded-xl border border-slate-700/60 bg-slate-800/60 p-5">
                <div className="flex items-start gap-3 mb-3">
                  <Av initials={cl.avatar} size="lg"/>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold text-slate-100 truncate">{cl.name}</div>
                    <div className="text-xs text-slate-400 truncate font-medium">{cl.company}</div>
                    <div className="text-xs text-slate-500 truncate">{cl.email}</div>
                    <div className="mt-1.5"><RoleBadge role="client"/></div>
                  </div>
                </div>
                <div className="flex items-center gap-1.5 text-xs text-slate-600 mb-4">
                  <Icon name="calendar" size={10}/>Joined {fmtDate(cl.joinedDate)}
                </div>
                <button
                  onClick={()=>setConfirmRemove({id:cl.id, name:cl.name, type:"client"})}
                  className="w-full flex items-center justify-center gap-1.5 py-2 rounded-lg bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 text-xs font-semibold transition-colors">
                  <Icon name="user-x" size={12}/>Remove Account
                </button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Removed accounts log */}
      {removed.length>0&&(
        <div>
          <h2 className="text-base font-bold text-slate-100 flex items-center gap-2 mb-4">
            <Icon name="archive" size={16} className="text-slate-500"/>Removed Accounts
            <span className="text-xs font-normal text-slate-600">— must re-register via invite code</span>
          </h2>
          <div className="rounded-xl border border-slate-700/40 bg-slate-800/30 overflow-hidden">
            {removed.map((r,i)=>(
              <div key={i} className={`flex items-center gap-3 px-4 py-3 ${i<removed.length-1?"border-b border-slate-700/40":""}`}>
                <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center shrink-0">
                  <Icon name="user-x" size={13} className="text-slate-500"/>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-semibold text-slate-400 truncate">{r.name}</div>
                  <div className="text-xs text-slate-600 truncate">{r.email}</div>
                </div>
                <div className="text-right shrink-0">
                  <RoleBadge role={r.type}/>
                  <div className="text-xs text-slate-600 mt-1">Removed {r.removedAt}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App(){
  const [role,setRole]=useState(ROLES.BOSS);
  const [nav,setNav]=useState("dashboard");
  const [selProj,setSelProj]=useState(null);
  const [projects,setProjects]=useState(INITIAL_PROJECTS);
  const [showNew,setShowNew]=useState(false);
  const [showBell,setShowBell]=useState(false);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  // Lifted user state — shared between Users tab and NewProjectModal
  const [activePMs,setActivePMs]=useState(TEAM_PMS);
  const [activeClients,setActiveClients]=useState(MOCK_CLIENTS_ACCOUNTS);

  const switchRole=r=>{setRole(r);setSelProj(null);setNav("dashboard");setSidebarOpen(false);};
  const assignPM=(pid,pmid)=>setProjects(p=>p.map(x=>x.id===pid?{...x,assignedPM:pmid}:x));
  const changeStatus=(pid,status)=>setProjects(p=>p.map(x=>x.id===pid?{...x,status,completion:status==="finished"?100:calcCompletion(x.timeline)}:x));
  const createProj=proj=>{setProjects(p=>[proj,...p]);setSelProj(proj);};
  const updateTimeline=(pid,timeline,completion,status)=>setProjects(p=>p.map(x=>x.id===pid?{...x,timeline,completion,status}:x));

  useEffect(()=>{
    if(!showBell)return;
    const fn=()=>setShowBell(false);
    setTimeout(()=>document.addEventListener("click",fn),0);
    return()=>document.removeEventListener("click",fn);
  },[showBell]);

  const navItems=[{id:"dashboard",label:"Dashboard",icon:"home"},...(role===ROLES.BOSS?[{id:"invites",label:"Invite Manager",icon:"key"},{id:"users",label:"Users",icon:"users"}]:[])];
  const userMap={boss:{name:"Alexander Reid",initials:"AR",title:"Site Director"},pm:{name:"Sarah Connors",initials:"SC",title:"Project Manager"},client:{name:"Apex Developments",initials:"AD",title:"Client Account"}};
  const user=userMap[role];
  const liveProj=selProj?(projects.find(p=>p.id===selProj.id)||selProj):null;

  const NOTIFS=[
    {icon:"shield-alert",color:"text-red-400",bg:"bg-red-500/10",title:"Urgent: MEP Tender Review",desc:"Meridian Tower · Requires approval",time:"2h ago"},
    {icon:"file-plus",color:"text-violet-400",bg:"bg-violet-500/10",title:"New document uploaded",desc:"Harborview · BOQ v1.2",time:"5h ago"},
    {icon:"message-circle",color:"text-sky-400",bg:"bg-sky-500/10",title:"Client message received",desc:"Apex Developments",time:"1d ago"},
    {icon:"check-circle-2",color:"text-emerald-400",bg:"bg-emerald-500/10",title:"Milestone completed",desc:"Westgate · Structural Works",time:"2d ago"},
  ];

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",background:"#020617",color:"#f1f5f9",fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      {showNew&&<NewProjectModal onClose={()=>setShowNew(false)} onCreate={createProj} activePMs={activePMs} activeClients={activeClients}/>}

      {/* Mobile sidebar overlay */}
      <div className={`sidebar-overlay${sidebarOpen?" open":""}`} onClick={()=>setSidebarOpen(false)}/>

      {/* ── Role Switcher ── */}
      <div className="shrink-0 border-b border-blue-900/40 px-3 sm:px-4 py-2" style={{background:"linear-gradient(to right,#0f172a,#0c1a3a,#0f172a)"}}>
        <div className="flex items-center justify-between gap-2 flex-wrap">
          <div className="flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-amber-400 blink" style={{display:"inline-block"}}/>
            <span className="text-xs font-bold text-amber-400 uppercase tracking-widest">Role Switcher</span>
          </div>
          <div className="flex items-center gap-1">
            {[{r:ROLES.BOSS,label:"The Boss",icon:"shield",ac:"bg-amber-600"},{r:ROLES.PM,label:"PM",icon:"hard-hat",ac:"bg-sky-600"},{r:ROLES.CLIENT,label:"Client",icon:"eye",ac:"bg-emerald-700"}].map(o=>(
              <button key={o.r} onClick={()=>switchRole(o.r)} className={`flex items-center gap-1.5 px-2.5 sm:px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${role===o.r?`${o.ac} text-white`:"bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-200"}`}>
                <Icon name={o.icon} size={11}/>{o.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── Body ── */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* Sidebar */}
        <div className="sidebar" style={{width:220,background:"#0f172a",borderRight:"1px solid #1e293b",display:"flex",flexDirection:"column",flexShrink:0}}>
          <div className="px-4 py-4 border-b border-slate-800 shrink-0">
            <div className="flex items-center gap-2.5">
              <div className="w-8 h-8 rounded-lg shrink-0 flex items-center justify-center" style={{background:"linear-gradient(135deg,#3b82f6,#1d4ed8)"}}><Icon name="building-2" size={15} className="text-white"/></div>
              <div><div className="font-black text-slate-100 text-sm tracking-tight">BUILDCO</div><div className="text-slate-500 font-semibold uppercase tracking-wider" style={{fontSize:9}}>Command Center</div></div>
            </div>
          </div>
          <nav style={{flex:1,overflowY:"auto"}} className="px-2 py-3">
            {navItems.map(item=>{const active=nav===item.id&&!selProj;return(
              <button key={item.id} onClick={()=>{setNav(item.id);setSelProj(null);setSidebarOpen(false);}} className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg mb-0.5 text-xs font-semibold transition-all ${active?"bg-blue-600/20 text-blue-300 border border-blue-500/20":"text-slate-400 hover:bg-slate-800 hover:text-slate-200"}`}>
                <Icon name={item.icon} size={14}/>{item.label}
              </button>);})}
            {selProj&&(<div className="mt-3 pt-3 border-t border-slate-800"><div className="uppercase tracking-wider px-3 mb-1.5 font-bold text-slate-600" style={{fontSize:9}}>Current Project</div><div className="flex items-center gap-2 px-3 py-2 rounded-lg bg-blue-600/10 border border-blue-500/20"><Icon name="building-2" size={12} className="text-blue-400 shrink-0"/><span className="text-xs text-blue-300 font-medium leading-tight truncate">{selProj.name}</span></div></div>)}
          </nav>
          <div className="p-3 border-t border-slate-800 shrink-0">
            <div className="flex items-center gap-2.5 px-2 py-1.5"><Av initials={user.initials} size="sm"/><div style={{flex:1,minWidth:0}}><div className="text-xs font-semibold text-slate-200 truncate">{user.name}</div><div className="truncate text-slate-500" style={{fontSize:10}}>{user.title}</div></div></div>
            {/* Role badge CENTERED */}
            <div className="mt-1.5 flex justify-center"><RoleBadge role={role}/></div>
          </div>
        </div>

        {/* Main */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Topbar */}
          <div style={{height:48,background:"#0f172a",borderBottom:"1px solid #1e293b",flexShrink:0,display:"flex",alignItems:"center"}} className="px-3 sm:px-5 gap-3">
            {/* Hamburger (mobile only) */}
            <button onClick={()=>setSidebarOpen(true)} className="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white" style={{display:"none"}} id="hamburger">
              <Icon name="menu" size={16}/>
            </button>
            <style>{`@media(max-width:768px){#hamburger{display:flex!important}}`}</style>

            <div style={{flex:1}} className="flex items-center gap-1.5 min-w-0">
              {selProj?(
                <><button onClick={()=>setSelProj(null)} className="text-slate-500 hover:text-slate-300 font-medium text-xs whitespace-nowrap hide-mobile">Projects</button><Icon name="chevron-right" size={12} className="text-slate-600 shrink-0 hide-mobile"/><span className="text-slate-200 font-semibold text-xs truncate">{selProj.name}</span></>
              ):(
                <h1 className="text-sm font-bold text-slate-200">{nav==="dashboard"?"Dashboard":nav==="invites"?"Invite Manager":"Users"}</h1>
              )}
            </div>

            {/* Bell only */}
            <div style={{position:"relative"}}>
              <button onClick={()=>setShowBell(p=>!p)} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-colors ${showBell?"bg-blue-600 text-white":"bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700"}`}>
                <Icon name="bell" size={15}/>
              </button>
              <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-slate-900" style={{pointerEvents:"none"}}/>
              {showBell&&(
                <div style={{position:"absolute",top:"calc(100% + 8px)",right:0,width:300,zIndex:200,background:"#0f172a",border:"1px solid #1e293b",borderRadius:14,boxShadow:"0 20px 60px rgba(0,0,0,.6)"}} onClick={e=>e.stopPropagation()}>
                  <div className="px-4 py-3 border-b border-slate-800 flex items-center justify-between">
                    <span className="text-xs font-bold text-slate-200 uppercase tracking-wider">Notifications</span>
                    <span className="text-xs text-blue-400 font-semibold cursor-pointer hover:text-blue-300" onClick={()=>setShowBell(false)}>Mark all read</span>
                  </div>
                  {NOTIFS.map((n,i)=>(
                    <div key={i} className="px-4 py-3 flex items-start gap-3 hover:bg-slate-800/60 cursor-pointer border-b border-slate-800/50">
                      <div className={`w-8 h-8 rounded-lg ${n.bg} flex items-center justify-center shrink-0 mt-0.5`}><Icon name={n.icon} size={14} className={n.color}/></div>
                      <div className="flex-1 min-w-0"><div className="text-xs font-semibold text-slate-200 leading-tight">{n.title}</div><div className="text-xs text-slate-500 mt-0.5 truncate">{n.desc}</div></div>
                      <div className="text-xs text-slate-600 shrink-0">{n.time}</div>
                    </div>
                  ))}
                  <div className="px-4 py-2.5 text-center"><span className="text-xs text-slate-500 hover:text-slate-300 cursor-pointer">View all</span></div>
                </div>
              )}
            </div>
          </div>

          {/* Page */}
          <div style={{flex:1,overflow:"hidden"}}>
            {selProj?<ProjectDetail project={liveProj} role={role} teamPMs={activePMs} onBack={()=>setSelProj(null)} onUpdateTimeline={updateTimeline}/>
            :nav==="invites"&&role===ROLES.BOSS?<InviteManager/>
            :nav==="users"&&role===ROLES.BOSS?<TeamView activePMs={activePMs} setActivePMs={setActivePMs} activeClients={activeClients} setActiveClients={setActiveClients} projects={projects}/>
            :<Dashboard projects={projects} role={role} teamPMs={activePMs} onSelect={p=>setSelProj(p)} onAssignPM={assignPM} onNew={()=>setShowNew(true)} onChangeStatus={changeStatus}/>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
